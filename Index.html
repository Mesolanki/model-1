<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Table</title>

</head>

<body>
    <div>
        <form id="registrationForm">
            <label>Register Form</label><br>
            <input type="text" id="username" placeholder="Enter a username" required> <br>
            <input type="email" id="email" placeholder="Enter an email" required> <br>
            <textarea id="description" placeholder="Enter description"></textarea> <br>
            <button type="submit">Submit</button>
        </form>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Sr. No</th>
                <th>Username</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script>
        const form = document.getElementById('registrationForm');
        const tableBody = document.querySelector('#dataTable tbody');
        let count = 1;

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;

            const newRow = document.createElement('tr');

            newRow.innerHTML = `
        <td>${count}</td>
        <td>${username}</td>
        <td>${email}</td>
    `;

            tableBody.appendChild(newRow);

            count++;
            form.reset();
        });
    </script>
</body>

</html>
